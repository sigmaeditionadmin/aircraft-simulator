<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Aircraft Simulator</title>

<style>
body{margin:0;overflow:hidden;font-family:monospace;}
#hud{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
}
</style>

</head>

<body>

<div id="hud">
Speed: <span id="speed">0</span><br>
Altitude: <span id="alt">0</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// Camera
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
);

// Renderer
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(100,200,100);
scene.add(sun);

// Ground
const groundGeo = new THREE.PlaneGeometry(2000,2000);
const groundMat = new THREE.MeshLambertMaterial({color:0x2f8f2f});
const ground = new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Mountains
for(let i=0;i<30;i++){

const mountain = new THREE.Mesh(
new THREE.ConeGeometry(
20+Math.random()*40,
40+Math.random()*80,
4
),
new THREE.MeshLambertMaterial({color:0x777777})
);

mountain.position.x = (Math.random()-0.5)*1500;
mountain.position.z = (Math.random()-0.5)*1500;
mountain.position.y = 20;

scene.add(mountain);

}

// Clouds
for(let i=0;i<40;i++){

const cloud = new THREE.Mesh(
new THREE.SphereGeometry(5+Math.random()*10,8,8),
new THREE.MeshLambertMaterial({color:0xffffff})
);

cloud.position.set(
(Math.random()-0.5)*1500,
80+Math.random()*80,
(Math.random()-0.5)*1500
);

scene.add(cloud);

}

// Plane
const plane = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(1,0.5,4),
new THREE.MeshLambertMaterial({color:0xff3333})
);

plane.add(body);

const wings = new THREE.Mesh(
new THREE.BoxGeometry(6,0.2,1),
new THREE.MeshLambertMaterial({color:0xff3333})
);

plane.add(wings);

const tail = new THREE.Mesh(
new THREE.BoxGeometry(1,1,0.2),
new THREE.MeshLambertMaterial({color:0xff3333})
);

tail.position.set(0,0.5,-2);

plane.add(tail);

plane.position.set(0,10,0);

scene.add(plane);

// Camera
camera.position.set(0,5,-10);

// Controls
const keys = {};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// Flight physics
let speed = 0.2;
let throttle = 0.2;

function animate(){

requestAnimationFrame(animate);

// Throttle control
if(keys["w"]) throttle += 0.005;
if(keys["s"]) throttle -= 0.005;

throttle = Math.max(0.05,Math.min(1,throttle));
speed = throttle;

// Forward movement
plane.translateZ(speed);

// Lift
plane.position.y += speed*0.05;

// Gravity
plane.position.y -= 0.02;

// Controls
if(keys["ArrowUp"]) plane.rotation.x += 0.02;
if(keys["ArrowDown"]) plane.rotation.x -= 0.02;

if(keys["a"]) plane.rotation.y += 0.02;
if(keys["d"]) plane.rotation.y -= 0.02;

if(keys["q"]) plane.rotation.z += 0.02;
if(keys["e"]) plane.rotation.z -= 0.02;

// Prevent underground
if(plane.position.y < 3){
plane.position.y = 3;
}

// Camera follow
camera.position.lerp(
new THREE.Vector3(
plane.position.x,
plane.position.y+5,
plane.position.z-12
),
0.08
);

camera.lookAt(plane.position);

// HUD
document.getElementById("speed").innerText = (speed*200).toFixed(0);
document.getElementById("alt").innerText = plane.position.y.toFixed(0);

// Render
renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
