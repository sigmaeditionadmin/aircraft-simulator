<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Aircraft Simulator</title>

<style>
body{margin:0;overflow:hidden;font-family:monospace;}

#hud{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
}
</style>

</head>
<body>

<div id="hud">
Speed: <span id="speed">0</span><br>
Altitude: <span id="alt">0</span><br>
Throttle: <span id="throttle">0</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB,500,10000);

// Camera
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
12000
);

// Renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(500,800,500);
scene.add(sun);

// Ground
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(12000,12000),
new THREE.MeshLambertMaterial({color:0x2f8f2f})
);

ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Mountains
const mountains=[];

for(let i=0;i<80;i++){

const height = 120 + Math.random()*200;
const radius = 80 + Math.random()*120;

const m = new THREE.Mesh(
new THREE.ConeGeometry(radius,height,6),
new THREE.MeshLambertMaterial({color:0x777777})
);

m.position.x=(Math.random()-0.5)*9000;
m.position.z=(Math.random()-0.5)*9000;
m.position.y=height/2;

m.userData.radius=radius;

mountains.push(m);
scene.add(m);

}

// Clouds
const clouds=[];

for(let i=0;i<60;i++){

const cloud=new THREE.Group();

for(let j=0;j<6;j++){

const puff=new THREE.Mesh(
new THREE.SphereGeometry(6+Math.random()*6,8,8),
new THREE.MeshLambertMaterial({color:0xffffff})
);

puff.position.set(
(Math.random()-0.5)*20,
Math.random()*5,
(Math.random()-0.5)*20
);

cloud.add(puff);

}

cloud.position.set(
(Math.random()-0.5)*9000,
150+Math.random()*200,
(Math.random()-0.5)*9000
);

cloud.userData.speed=0.03;

clouds.push(cloud);
scene.add(cloud);

}

// ===== F16 Style Jet =====

const plane = new THREE.Group();

// Nose
const nose = new THREE.Mesh(
new THREE.ConeGeometry(0.35,2.5,12),
new THREE.MeshLambertMaterial({color:0x888888})
);

nose.rotation.x = Math.PI/2;
nose.position.z = 2.3;
plane.add(nose);

// Fuselage
const fuselage = new THREE.Mesh(
new THREE.CylinderGeometry(0.45,0.45,5,12),
new THREE.MeshLambertMaterial({color:0x888888})
);

fuselage.rotation.x = Math.PI/2;
plane.add(fuselage);

// Canopy
const canopy = new THREE.Mesh(
new THREE.SphereGeometry(0.45,16,16),
new THREE.MeshLambertMaterial({color:0x223344})
);

canopy.scale.set(1,0.5,1.2);
canopy.position.set(0,0.4,0.8);
plane.add(canopy);

// Air intake
const intake = new THREE.Mesh(
new THREE.BoxGeometry(0.6,0.3,0.8),
new THREE.MeshLambertMaterial({color:0x555555})
);

intake.position.set(0,-0.25,1);
plane.add(intake);

// Wings
const wings = new THREE.Mesh(
new THREE.BoxGeometry(3.5,0.1,1.2),
new THREE.MeshLambertMaterial({color:0x888888})
);
plane.add(wings);

// Vertical tail
const tail = new THREE.Mesh(
new THREE.BoxGeometry(0.2,1.3,0.7),
new THREE.MeshLambertMaterial({color:0x888888})
);

tail.position.set(0,0.9,-2);
plane.add(tail);

// Rear stabilizers
const tailWing = new THREE.Mesh(
new THREE.BoxGeometry(1.6,0.05,0.6),
new THREE.MeshLambertMaterial({color:0x888888})
);

tailWing.position.set(0,0,-2.2);
plane.add(tailWing);

// Engine
const engine = new THREE.Mesh(
new THREE.CylinderGeometry(0.35,0.35,1,12),
new THREE.MeshLambertMaterial({color:0x333333})
);

engine.rotation.x = Math.PI/2;
engine.position.z = -3;
plane.add(engine);

plane.position.set(0,20,0);
scene.add(plane);

// Controls
const keys={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// Flight variables
let throttle=0.3;
let speed=0.3;
let verticalSpeed=0;

function animate(){

requestAnimationFrame(animate);

// Throttle
if(keys["w"]) throttle+=0.004;
if(keys["s"]) throttle-=0.004;

throttle=Math.max(0.1,Math.min(1,throttle));
speed=throttle;

// Forward
plane.translateZ(speed);

// Turn
if(keys["a"]) plane.rotation.y+=0.03;
if(keys["d"]) plane.rotation.y-=0.03;

// Climb
if(keys[" "]) verticalSpeed+=0.02;
else if(keys["shift"]) verticalSpeed-=0.02;
else verticalSpeed*=0.95;

// Apply vertical
plane.position.y+=verticalSpeed;

// Prevent underground
if(plane.position.y<3){
plane.position.y=3;
verticalSpeed=0;
}

// Mountain collision
mountains.forEach(m=>{

const dx=plane.position.x-m.position.x;
const dz=plane.position.z-m.position.z;

const dist=Math.sqrt(dx*dx+dz*dz);

if(dist<m.userData.radius){

const angle=Math.atan2(dz,dx);

plane.position.x=m.position.x+Math.cos(angle)*m.userData.radius;
plane.position.z=m.position.z+Math.sin(angle)*m.userData.radius;

const minY=m.position.y+2;

if(plane.position.y<minY){
plane.position.y=minY;
verticalSpeed=0;
}

}

});

// Pitch
const targetPitch = THREE.MathUtils.clamp(-verticalSpeed*2,-0.6,0.6);
plane.rotation.x = THREE.MathUtils.lerp(plane.rotation.x,targetPitch,0.1);

// Lock roll
plane.rotation.z = 0;

// Camera
const offset=new THREE.Vector3(0,6,-14);
offset.applyQuaternion(plane.quaternion);

const camPos=plane.position.clone().add(offset);

camera.position.lerp(camPos,0.1);
camera.lookAt(plane.position);

// Move clouds
clouds.forEach(c=>{
c.position.x+=c.userData.speed;
if(c.position.x>9000) c.position.x=-9000;
});

// HUD
document.getElementById("speed").innerText=(speed*200).toFixed(0);
document.getElementById("alt").innerText=plane.position.y.toFixed(0);
document.getElementById("throttle").innerText=Math.round(throttle*100);

// Render
renderer.render(scene,camera);

}

animate();

// Resize
window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
