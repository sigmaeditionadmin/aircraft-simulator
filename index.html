<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Aircraft Simulator</title>
<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // sky blue

// Camera
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth / window.innerHeight,
0.1,
1000
);

// Renderer
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// Ground
const groundGeo = new THREE.PlaneGeometry(500,500);
const groundMat = new THREE.MeshLambertMaterial({color:0x228B22});
const ground = new THREE.Mesh(groundGeo, groundMat);

ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Plane (made from boxes)
const plane = new THREE.Group();

// body
const body = new THREE.Mesh(
new THREE.BoxGeometry(1,0.5,4),
new THREE.MeshLambertMaterial({color:0xff0000})
);
plane.add(body);

// wings
const wing = new THREE.Mesh(
new THREE.BoxGeometry(6,0.2,1),
new THREE.MeshLambertMaterial({color:0xff0000})
);
plane.add(wing);

// tail
const tail = new THREE.Mesh(
new THREE.BoxGeometry(1,1,0.2),
new THREE.MeshLambertMaterial({color:0xff0000})
);
tail.position.set(0,0.5,-2);
plane.add(tail);

plane.position.y = 3;

scene.add(plane);

// Camera position
camera.position.set(0,5,-10);

// Controls
const keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// Animation
function animate(){

requestAnimationFrame(animate);

// Forward movement
plane.translateZ(0.2);

// Controls
if(keys["ArrowUp"]) plane.rotation.x += 0.02;
if(keys["ArrowDown"]) plane.rotation.x -= 0.02;

if(keys["a"]) plane.rotation.y += 0.02;
if(keys["d"]) plane.rotation.y -= 0.02;

if(keys["q"]) plane.rotation.z += 0.02;
if(keys["e"]) plane.rotation.z -= 0.02;

// Camera follow
camera.position.lerp(
new THREE.Vector3(
plane.position.x,
plane.position.y + 5,
plane.position.z - 10
),
0.1
);

camera.lookAt(plane.position);

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
