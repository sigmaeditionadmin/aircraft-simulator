<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>F16 Simulator with Trees & Clouds</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:monospace;}

#hud{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
width:20px;
height:20px;
margin-left:-10px;
margin-top:-10px;
border:2px solid rgba(255,255,255,0.7);
border-radius:50%;
pointer-events:none;
}
</style>

</head>

<body>

<div id="hud">
Speed: <span id="speed">0</span><br>
Altitude: <span id="alt">0</span>
</div>

<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/////////////////////////
// SCENE
/////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
20000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(500,800,500);
scene.add(sun);

/////////////////////////
// TERRAIN
/////////////////////////

const terrainGeo = new THREE.PlaneGeometry(20000,20000,200,200);
terrainGeo.rotateX(-Math.PI/2);

const verts = terrainGeo.attributes.position;

for(let i=0;i<verts.count;i++){
    const x = verts.getX(i);
    const z = verts.getZ(i);
    const height =
        Math.sin(x*0.002)*120 +
        Math.cos(z*0.002)*120 +
        Math.random()*20;
    verts.setY(i,height);
}

terrainGeo.computeVertexNormals();

const terrain = new THREE.Mesh(
terrainGeo,
new THREE.MeshLambertMaterial({color:0x2f8f2f})
);

scene.add(terrain);

/////////////////////////
// CLOUDS (MORE DENSE)
/////////////////////////

const clouds = [];

for (let i = 0; i < 120; i++) { // more clouds

    const cloud = new THREE.Group();

    for (let j = 0; j < 6; j++) {
        const puff = new THREE.Mesh(
            new THREE.SphereGeometry(6 + Math.random() * 6, 8, 8),
            new THREE.MeshLambertMaterial({ color: 0xffffff })
        );
        puff.position.set(
            (Math.random() - 0.5) * 20,
            Math.random() * 8,
            (Math.random() - 0.5) * 20
        );
        cloud.add(puff);
    }

    cloud.position.set(
        (Math.random() - 0.5) * 15000,
        250 + Math.random() * 350,
        (Math.random() - 0.5) * 15000
    );

    cloud.userData.speed = 0.05;
    clouds.push(cloud);
    scene.add(cloud);
}

/////////////////////////
// TREES
/////////////////////////

const trees = [];

for (let i = 0; i < 300; i++) {

    const tree = new THREE.Group();

    // trunk
    const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.3, 0.3, 3, 8),
        new THREE.MeshLambertMaterial({ color: 0x8B4513 })
    );
    trunk.position.y = 1.5;
    tree.add(trunk);

    // foliage
    const foliage = new THREE.Mesh(
        new THREE.ConeGeometry(1.5, 4, 8),
        new THREE.MeshLambertMaterial({ color: 0x228B22 })
    );
    foliage.position.y = 4;
    tree.add(foliage);

    // scatter over terrain
    const x = (Math.random() - 0.5) * 18000;
    const z = (Math.random() - 0.5) * 18000;

    const terrainHeight = Math.sin(x * 0.002) * 120 + Math.cos(z * 0.002) * 120 + Math.random() * 20;

    tree.position.set(x, terrainHeight, z);

    trees.push(tree);
    scene.add(tree);
}

/////////////////////////
// FLIGHT GROUPS
/////////////////////////

const yawGroup = new THREE.Group();
const pitchGroup = new THREE.Group();

yawGroup.add(pitchGroup);
scene.add(yawGroup);

/////////////////////////
// F16 JET MODEL
/////////////////////////

const jet = new THREE.Group();

// fuselage
const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5, 0.5, 7, 12),
    new THREE.MeshLambertMaterial({ color: 0x888888 })
);
body.rotation.x = Math.PI/2;
jet.add(body);

// nose
const nose = new THREE.Mesh(
    new THREE.ConeGeometry(0.4, 2.5, 12),
    new THREE.MeshLambertMaterial({ color: 0x888888 })
);
nose.rotation.x = Math.PI/2;
nose.position.z = 4.5;
jet.add(nose);

// canopy
const canopy = new THREE.Mesh(
    new THREE.SphereGeometry(0.6, 12, 12),
    new THREE.MeshLambertMaterial({ color: 0x223344 })
);
canopy.scale.set(1, 0.6, 1.5);
canopy.position.set(0, 0.6, 1.5);
jet.add(canopy);

// intake
const intake = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.4, 1),
    new THREE.MeshLambertMaterial({ color: 0x555555 })
);
intake.position.set(0, -0.4, 1.5);
jet.add(intake);

// wings
const wings = new THREE.Mesh(
    new THREE.BoxGeometry(8, 0.1, 2),
    new THREE.MeshLambertMaterial({ color: 0x888888 })
);
jet.add(wings);

// tail stabilizers
const rearWing = new THREE.Mesh(
    new THREE.BoxGeometry(3, 0.1, 1),
    new THREE.MeshLambertMaterial({ color: 0x888888 })
);
rearWing.position.z = -2.5;
jet.add(rearWing);

// vertical tail
const tail = new THREE.Mesh(
    new THREE.BoxGeometry(0.2, 2, 1),
    new THREE.MeshLambertMaterial({ color: 0x888888 })
);
tail.position.set(0, 1, -2.8);
jet.add(tail);

// missiles
function missile(x) {
    const m = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.08, 1.2, 8),
        new THREE.MeshLambertMaterial({ color: 0xffffff })
    );
    m.rotation.x = Math.PI/2;
    m.position.set(x, -0.3, 0.5);
    jet.add(m);
}
missile(-3);
missile(3);

// afterburner
const flame = new THREE.Mesh(
    new THREE.ConeGeometry(0.4, 1.5, 12),
    new THREE.MeshBasicMaterial({ color: 0xff5500 })
);
flame.rotation.x = -Math.PI/2;
flame.position.z = -4;
jet.add(flame);

pitchGroup.add(jet);
yawGroup.position.set(0, 200, 0);

/////////////////////////
// CONTROLS
/////////////////////////

const keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

/////////////////////////
// FLIGHT VARIABLES
/////////////////////////

let throttle = 0.4;
let speed = 0.4;
let verticalSpeed = 0;
let pitch = 0;

/////////////////////////
// ANIMATION
/////////////////////////

function animate() {
    requestAnimationFrame(animate);

    // throttle
    if (keys["w"]) throttle += 0.004;
    if (keys["s"]) throttle -= 0.004;
    throttle = Math.max(0.1, Math.min(1, throttle));
    speed = throttle;

    // forward
    yawGroup.translateZ(speed);

    // turning
    if (keys["a"]) yawGroup.rotation.y += 0.025;
    if (keys["d"]) yawGroup.rotation.y -= 0.025;

    // climb / descend
    if (keys[" "]) verticalSpeed += 0.03;
    else if (keys["shift"]) verticalSpeed -= 0.03;
    else verticalSpeed *= 0.96;

    yawGroup.position.y += verticalSpeed;
    if (yawGroup.position.y < 10) {
        yawGroup.position.y = 10;
        verticalSpeed = 0;
    }

    // pitch (no sideways tilt)
    const targetPitch = THREE.MathUtils.clamp(-verticalSpeed * 1.5, -0.6, 0.6);
    pitch = THREE.MathUtils.lerp(pitch, targetPitch, 0.1);
    pitchGroup.rotation.x = pitch;

    // camera
    const offset = new THREE.Vector3(0, 7, -18);
    offset.applyQuaternion(yawGroup.quaternion);
    const camPos = yawGroup.position.clone().add(offset);
    camera.position.lerp(camPos, 0.1);
    camera.lookAt(yawGroup.position);

    // clouds
    clouds.forEach(c => {
        c.position.x += c.userData.speed;
        if (c.position.x > 15000) c.position.x = -15000;
    });

    // HUD
    document.getElementById("speed").innerText = (speed * 250).toFixed(0);
    document.getElementById("alt").innerText = yawGroup.position.y.toFixed(0);

    renderer.render(scene, camera);
}

animate();

/////////////////////////
// RESIZE
/////////////////////////

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
