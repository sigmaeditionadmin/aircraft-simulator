<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Aircraft Simulator</title>

<style>
body{margin:0;overflow:hidden;font-family:monospace;}

#hud{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
}
</style>

</head>
<body>

<div id="hud">
Speed: <span id="speed">0</span><br>
Altitude: <span id="alt">0</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// Camera
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
12000
);

// Renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// Sun
const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(500,800,500);
scene.add(sun);

// Ground
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(12000,12000),
new THREE.MeshLambertMaterial({color:0x2f8f2f})
);

ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Mountains
const mountains=[];

for(let i=0;i<80;i++){

const height = 120 + Math.random()*200;
const radius = 80 + Math.random()*120;

const mountain = new THREE.Mesh(
new THREE.ConeGeometry(radius,height,6),
new THREE.MeshLambertMaterial({color:0x777777})
);

mountain.position.x = (Math.random()-0.5)*9000;
mountain.position.z = (Math.random()-0.5)*9000;
mountain.position.y = height/2;

mountain.userData.radius = radius;

mountains.push(mountain);
scene.add(mountain);

}

// Clouds
const clouds=[];

for(let i=0;i<60;i++){

const cloud = new THREE.Group();

for(let j=0;j<6;j++){

const puff = new THREE.Mesh(
new THREE.SphereGeometry(6+Math.random()*6,8,8),
new THREE.MeshLambertMaterial({color:0xffffff})
);

puff.position.set(
(Math.random()-0.5)*20,
Math.random()*5,
(Math.random()-0.5)*20
);

cloud.add(puff);

}

cloud.position.set(
(Math.random()-0.5)*9000,
150 + Math.random()*200,
(Math.random()-0.5)*9000
);

cloud.userData.speed = 0.03;

clouds.push(cloud);
scene.add(cloud);

}

/////////////////////////////////////////////////
// FLIGHT GROUP SYSTEM (prevents side tilt)
/////////////////////////////////////////////////

const yawGroup = new THREE.Group();
const pitchGroup = new THREE.Group();

yawGroup.add(pitchGroup);
scene.add(yawGroup);

/////////////////////////////////////////////////
// F16 STYLE JET
/////////////////////////////////////////////////

const jet = new THREE.Group();

// fuselage
const body = new THREE.Mesh(
new THREE.BoxGeometry(0.8,0.8,6),
new THREE.MeshLambertMaterial({color:0x888888})
);
jet.add(body);

// nose
const nose = new THREE.Mesh(
new THREE.ConeGeometry(0.4,2,10),
new THREE.MeshLambertMaterial({color:0x888888})
);
nose.rotation.x = Math.PI/2;
nose.position.z = 4;
jet.add(nose);

// cockpit
const cockpit = new THREE.Mesh(
new THREE.SphereGeometry(0.5,12,12),
new THREE.MeshLambertMaterial({color:0x223344})
);
cockpit.scale.set(1,0.6,1.4);
cockpit.position.set(0,0.5,1.5);
jet.add(cockpit);

// wings
const wingGeo = new THREE.BoxGeometry(8,0.1,2);

const wings = new THREE.Mesh(
wingGeo,
new THREE.MeshLambertMaterial({color:0x888888})
);
wings.position.z = 0;
jet.add(wings);

// tail wing
const tailWing = new THREE.Mesh(
new THREE.BoxGeometry(3,0.1,1),
new THREE.MeshLambertMaterial({color:0x888888})
);
tailWing.position.z = -2.5;
jet.add(tailWing);

// vertical tail
const tail = new THREE.Mesh(
new THREE.BoxGeometry(0.2,1.8,1),
new THREE.MeshLambertMaterial({color:0x888888})
);

tail.position.set(0,1,-2.5);
jet.add(tail);

pitchGroup.add(jet);

// starting position
yawGroup.position.set(0,20,0);

/////////////////////////////////////////////////
// CONTROLS
/////////////////////////////////////////////////

const keys={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/////////////////////////////////////////////////
// FLIGHT VARIABLES
/////////////////////////////////////////////////

let throttle = 0.3;
let speed = 0.3;
let verticalSpeed = 0;
let pitch = 0;

/////////////////////////////////////////////////
// ANIMATION LOOP
/////////////////////////////////////////////////

function animate(){

requestAnimationFrame(animate);

// throttle
if(keys["w"]) throttle += 0.004;
if(keys["s"]) throttle -= 0.004;

throttle=Math.max(0.1,Math.min(1,throttle));
speed=throttle;

// forward
yawGroup.translateZ(speed);

// turn
if(keys["a"]) yawGroup.rotation.y += 0.03;
if(keys["d"]) yawGroup.rotation.y -= 0.03;

// climb / descend
if(keys[" "]) verticalSpeed += 0.02;
else if(keys["shift"]) verticalSpeed -= 0.02;
else verticalSpeed *= 0.95;

// altitude
yawGroup.position.y += verticalSpeed;

if(yawGroup.position.y < 3){
yawGroup.position.y = 3;
verticalSpeed = 0;
}

// pitch control
const targetPitch = THREE.MathUtils.clamp(-verticalSpeed*2,-0.6,0.6);
pitch = THREE.MathUtils.lerp(pitch,targetPitch,0.1);

pitchGroup.rotation.x = pitch;

/////////////////////////////////////////////////
// MOUNTAIN COLLISION
/////////////////////////////////////////////////

mountains.forEach(m=>{

const dx = yawGroup.position.x - m.position.x;
const dz = yawGroup.position.z - m.position.z;

const dist = Math.sqrt(dx*dx + dz*dz);

if(dist < m.userData.radius){

const angle = Math.atan2(dz,dx);

yawGroup.position.x = m.position.x + Math.cos(angle)*m.userData.radius;
yawGroup.position.z = m.position.z + Math.sin(angle)*m.userData.radius;

const minY = m.position.y + 2;

if(yawGroup.position.y < minY){
yawGroup.position.y = minY;
verticalSpeed = 0;
}

}

});

/////////////////////////////////////////////////
// CAMERA
/////////////////////////////////////////////////

const offset = new THREE.Vector3(0,6,-16);
offset.applyQuaternion(yawGroup.quaternion);

const camPos = yawGroup.position.clone().add(offset);

camera.position.lerp(camPos,0.1);
camera.lookAt(yawGroup.position);

/////////////////////////////////////////////////
// CLOUDS
/////////////////////////////////////////////////

clouds.forEach(c=>{
c.position.x += c.userData.speed;
if(c.position.x > 9000) c.position.x = -9000;
});

/////////////////////////////////////////////////
// HUD
/////////////////////////////////////////////////

document.getElementById("speed").innerText=(speed*200).toFixed(0);
document.getElementById("alt").innerText=yawGroup.position.y.toFixed(0);

renderer.render(scene,camera);

}

animate();

// resize
window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
